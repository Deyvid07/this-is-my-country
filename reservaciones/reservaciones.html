<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hoteles El Salvador</title>

<style>

body{
    margin:0;
    font-family: Georgia, serif;
    background:#e6e6e6;
}

.container{
    display:flex;
    height:100vh;
}

/* MENU IZQUIERDO */
.menu{
    width:35%;
    background-image:url("https://images.unsplash.com/photo-1505691938895-1758d7feb511");
    background-size:cover;
    background-position:center;
    color:white;
    position:relative;
}

.menu-overlay{
    background:rgba(0,0,0,0.45);
    height:100%;
    padding:40px;
}

.logo img{
    width:80px;
    height:auto;
}

/* GRID MENU */
.menu h2{
    margin-top:0;
}

.menu-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:30px;
    font-size:13px;
}

.menu-grid div{
    background:#742821(139,107,79,0.85); /* mismo color de botones */
    border-radius:5px;
    text-align:center;
    padding:10px;
    transition:all 0.3s ease;
}

.menu-grid div:hover{
    background:#742821; /* oscuro al pasar el mouse */
    cursor:pointer;
}

.menu-grid div a{
    color:white;
    text-decoration:none;
    display:block;
    font-weight:bold;
}

.menu-grid div a:hover{
    text-decoration:underline;
}

/* BOTONES INFERIORES */
.menu-buttons{
    position:absolute;
    bottom:30px;
    left:40px;
    display:flex;
    gap:15px;
}

.menu-buttons button{
    background:#742821;
    border:none;
    padding:10px 20px;
    color:white;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
    transition:all 0.3s ease;
}

.menu-buttons button:hover{
    background:#742821;
}

/* CONTENIDO DERECHO */
.content{
    width:65%;
    overflow:auto;
    padding:20px;
}

.hotel{
    margin-bottom:40px;
}

.hotel h2{
    text-align:center;
    background:#d9d9d9;
    padding:5px;
    font-weight:normal;
    border-radius:5px;
}

.hotel-images{
    display:grid;
    grid-template-columns:2fr 1fr 1fr;
    gap:10px;
    margin-top:10px;
}

.hotel-images img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:5px;
}

/* OPCIONAL: ENLACES EN RESULTADOS */
.vdis a{
    color:white;
    text-decoration:none;
    display:block;
    width:100%;
    padding:6px;
}

.vdis:hover a{
    background-color:#742821;
    border-radius:3px;
}
    

</style>
</head>
